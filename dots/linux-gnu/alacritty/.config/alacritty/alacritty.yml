# Configuration for Alacritty, the GPU enhanced terminal emulator.

window:
  padding:
    x: 10
    y: 10

scrolling:
  multiplier: 10

font:
  normal:
    family: SauceCodePro Nerd Font Mono
  size: 12.0

# Live config reload (changes require restart)
live_config_reload: true

import:
  - ~/.config/alacritty/dracula.yml
